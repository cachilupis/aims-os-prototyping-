  <!-- ═══════════════════════════════════════════════════════════
       JAVASCRIPT — Sidebar toggle + helpers
       ═══════════════════════════════════════════════════════════ -->
  <script>
    // Sidebar expand/collapse
    const sidebar = document.getElementById('sidebar');
    sidebar.addEventListener('dblclick', () => sidebar.classList.toggle('expanded'));

    // Tab switching helper
    function switchTab(activeEl) {
      const tabBar = activeEl.closest('.tabs');
      tabBar.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      activeEl.classList.add('active');
    }

    // Toast notification helper
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `alert-banner alert-banner--${type}`;
      toast.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:200;width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.3);animation:slideUp 0.2s ease';
      toast.innerHTML = `
        <div class="alert-banner__body">
          <span class="alert-banner__title">${message}</span>
        </div>
        <div class="alert-banner__actions">
          <button class="alert-banner__close" onclick="this.closest('.alert-banner').remove()">×</button>
        </div>`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // Auto-expand textarea
    document.querySelectorAll('.chat-box__input').forEach(ta => {
      ta.addEventListener('input', () => {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
        const btn = ta.closest('.chat-box')?.querySelector('.chat-box__send');
        if (btn) {
          btn.classList.toggle('active', ta.value.trim().length > 0);
          btn.classList.toggle('idle', ta.value.trim().length === 0);
        }
      });
    });
  </script>

  <style>
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
